<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genki I 単語カード（第1〜7課）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--orange:#e8590c;--bg:#fff7f0;--card:#ffffff;--ink:#333;--ok:#2b8a3e;--ng:#c92a2a;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:"BIZ UDPGothic","Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;}
  body{background:var(--bg);color:var(--ink);min-height:100vh;padding:16px;}
  @media(max-width:480px){
    body{padding:10px;}
    .word{font-size:1.9rem;}
    .meaning{font-size:1.35rem;}
    .card{height:270px;}
    .selects{grid-template-columns:1fr;gap:6px;}
    .toolbar{gap:6px;}
    .seg button,.ghost{font-size:.8rem;padding:8px 10px;}
    .qword{font-size:1.6rem;}
    .choices button{padding:12px;font-size:.95rem;}
    .gcell{font-size:1.1rem;padding:4px 1px;}
    .gcell .romaji{font-size:.58rem;}
  }
  h1{font-size:1.2rem;color:var(--orange);text-align:center;margin-bottom:12px;}
  .kicker{font-size:.72rem;color:#b08968;text-align:center;letter-spacing:.3em;font-weight:700;margin-bottom:4px;}
  /* 整列ツールバー */
  .panel{max-width:620px;margin:0 auto;}
  .selects{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
  .selects select{width:100%;padding:10px 8px;border:2px solid #f0c4a8;border-radius:10px;background:#fff;
    color:var(--ink);font-size:.88rem;font-weight:600;cursor:pointer;appearance:none;
    background-image:url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23e8590c'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right 10px center;padding-right:26px;}
  .selects select:focus{outline:none;border-color:var(--orange);}
  .toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
  .seg{display:flex;border:2px solid var(--orange);border-radius:10px;overflow:hidden;}
  .seg button{border:none;padding:9px 20px;background:#fff;color:var(--orange);font-size:.92rem;font-weight:700;cursor:pointer;}
  .seg button.active{background:var(--orange);color:#fff;}
  .ghost{padding:9px 14px;border:2px solid #f0c4a8;border-radius:10px;background:#fff;color:#a05a2c;
    font-size:.88rem;font-weight:700;cursor:pointer;}
  .ghost.active{border-color:var(--orange);color:var(--orange);background:var(--soft);}
  .stage{max-width:560px;margin:0 auto;}
  /* flashcard */
  .card{perspective:1000px;height:300px;cursor:pointer;}
  .inner{position:relative;width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d;}
  .card.flipped .inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border:3px solid var(--orange);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:0 4px 14px rgba(232,89,12,.15);}
  .back{transform:rotateY(180deg);background:#fff3e6;}
  .word{font-size:2.4rem;font-weight:700;text-align:center;line-height:1.3;}
  .kanji{font-size:1.3rem;color:#888;margin-top:8px;}
  .romaji{font-size:1.05rem;color:#b08968;margin-top:6px;font-style:italic;letter-spacing:.03em;}
  body.noromaji .romaji{display:none;}
  .choices .romaji{display:block;font-size:.8rem;margin-top:2px;}
  /* ひらがな表モーダル */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:50;
    align-items:flex-start;justify-content:center;overflow:auto;padding:20px 8px;}
  .modal.open{display:flex;}
  .chart{background:var(--bg);border-radius:16px;padding:18px;max-width:760px;width:100%;}
  .chart h2{color:var(--orange);font-size:1.1rem;text-align:center;margin-bottom:10px;}
  .chartCtl{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
  .chartCtl button{padding:6px 14px;border:2px solid var(--orange);border-radius:8px;background:#fff;
    color:var(--orange);font-weight:700;cursor:pointer;}
  .chartCtl button.active{background:var(--orange);color:#fff;}
  .gojuon{display:grid;grid-template-rows:repeat(5,1fr);grid-auto-flow:column;gap:4px;direction:rtl;}
  .gcell{background:#fff;border:1.5px solid var(--orange);border-radius:8px;text-align:center;
    padding:6px 2px;font-size:1.45rem;font-weight:700;min-width:0;direction:ltr;}
  .gcell .romaji{display:block;font-size:.7rem;font-style:italic;color:var(--brown,#b08968);}
  .gcell.empty{visibility:hidden;}
  .dakuon{margin-top:12px;}
  .dakuon h3{color:var(--orange);font-size:.9rem;margin:8px 0 6px;}
  .drow{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;direction:rtl;}
  .meaning{font-size:1.7rem;font-weight:700;text-align:center;}
  .tag{position:absolute;top:12px;left:14px;font-size:.75rem;background:var(--orange);color:#fff;padding:3px 10px;border-radius:99px;}
  .hint{position:absolute;bottom:10px;font-size:.75rem;color:#bbb;}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px;}
  .nav button{flex:1;padding:12px;font-size:1rem;border:none;border-radius:10px;background:var(--orange);color:#fff;cursor:pointer;font-weight:700;}
  .nav button.sub{background:#fff;color:var(--orange);border:2px solid var(--orange);}
  .counter{text-align:center;margin-top:10px;color:#999;font-size:.9rem;}
  /* quiz */
  .qword{font-size:2rem;font-weight:700;text-align:center;margin:18px 0 6px;}
  .qkanji{text-align:center;color:#888;margin-bottom:14px;min-height:1.4em;}
  .choices{display:grid;gap:10px;}
  .choices button{padding:14px;font-size:1.05rem;border:2px solid var(--orange);border-radius:10px;background:#fff;cursor:pointer;text-align:center;}
  .choices button.correct{background:#d3f9d8;border-color:var(--ok);}
  .choices button.wrong{background:#ffe3e3;border-color:var(--ng);}
  .score{text-align:center;font-size:1rem;margin-top:14px;font-weight:700;}
  .result{background:#fff;border:3px solid var(--orange);border-radius:18px;padding:28px;text-align:center;}
  .result h2{color:var(--orange);margin-bottom:10px;}
  .missed{text-align:left;margin-top:14px;font-size:.95rem;}
  .missed li{margin:4px 0;}
  .hidden{display:none;}
</style>
</head>

<div class="panel">

    <select id="lesson">

        <option value="1">Lesson 1</option>
        <option value="2">Lesson 2</option>
        <option value="3">Lesson 3</option>
        <option value="4">Lesson 4</option>
        <option value="5">Lesson 5</option>
        <option value="6">Lesson 6</option>
        <option value="7">Lesson 7</option>

        <option value="u4">Up to Lesson 4 (L1–4)</option>
        <option value="u5">Up to Lesson 5 (L1–5)</option>
        <option value="u6">Up to Lesson 6 (L1–6)</option>
        <option value="u7">Up to Lesson 7 (L1–7)</option>
      </optgroup>
    </select>
    <select id="cat"></select>
    <select id="dir">
      <option value="je">Japanese → English</option>
      <option value="ej">English → Japanese</option>
    </select>
  </div>
  <div class="toolbar">
    <div class="seg">
      <button id="modeCard" class="active">Cards</button>
      <button id="modeQuiz">Quiz</button>
    </div>
    <button id="shuffleBtn" class="ghost">Shuffle</button>
    <button id="romajiBtn" class="ghost active">Romaji</button>
    <button id="chartBtn" class="ghost">あ Kana chart</button>
    <button id="missedBtn" class="ghost" style="border-color:#c2255c;color:#c2255c;">★ Missed (0)</button>
  </div>
</div>

<div class="stage">
  <!-- flashcard mode -->
  <div id="cardMode">
    <div class="card" id="card">
      <div class="inner">

        <div class="face back"><span class="tag" id="tagB"></span><div class="meaning" id="backTxt"></div><div class="romaji" id="backRomaji"></div><div class="kanji" id="backSub"></div></div>
      </div>
    </div>
    <div class="nav">
      <button class="sub" id="prev">← Back</button>
      <button id="next">Next →</button>
    </div>
    <div class="counter" id="counter"></div>
  </div>

  <!-- quiz mode -->
  <div id="quizMode" class="hidden">
    <div id="quizBody">
      <div class="qword" id="qWord"></div>
      <div class="romaji" id="qRomaji" style="text-align:center;"></div>
      <div class="qkanji" id="qKanji"></div>
      <div class="choices" id="choices"></div>
      <div class="score" id="qScore"></div>
    </div>
    <div id="quizResult" class="result hidden"></div>
  </div>
</div>

<!-- ひらがな表モーダル -->
<div class="modal" id="chartModal">
  <div class="chart">
    <h2>Hiragana Chart（五十音）</h2>
    <div class="chartCtl">
      <button id="chartRomaji" class="active">Romaji</button>
      <button id="chartClose">Close ✕</button>
    </div>
    <div class="gojuon" id="gojuon"></div>
    <div class="dakuon" id="dakuon"></div>
  </div>
</div>

// ===== かな→ローマ字変換 =====
const DI={"きゃ":"kya","きゅ":"kyu","きょ":"kyo","ぎゃ":"gya","ぎゅ":"gyu","ぎょ":"gyo","しゃ":"sha","しゅ":"shu","しょ":"sho","じゃ":"ja","じゅ":"ju","じょ":"jo","ちゃ":"cha","ちゅ":"chu","ちょ":"cho","にゃ":"nya","にゅ":"nyu","にょ":"nyo","ひゃ":"hya","ひゅ":"hyu","ひょ":"hyo","びゃ":"bya","びゅ":"byu","びょ":"byo","ぴゃ":"pya","ぴゅ":"pyu","ぴょ":"pyo","みゃ":"mya","みゅ":"myu","みょ":"myo","りゃ":"rya","りゅ":"ryu","りょ":"ryo","てぃ":"ti","でぃ":"di","とぅ":"tu","どぅ":"du","ふぁ":"fa","ふぃ":"fi","ふぇ":"fe","ふぉ":"fo","うぃ":"wi","うぇ":"we","うぉ":"wo","しぇ":"she","ちぇ":"che","じぇ":"je"};
const MONO={"あ":"a","い":"i","う":"u","え":"e","お":"o","か":"ka","き":"ki","く":"ku","け":"ke","こ":"ko","が":"ga","ぎ":"gi","ぐ":"gu","げ":"ge","ご":"go","さ":"sa","し":"shi","す":"su","せ":"se","そ":"so","ざ":"za","じ":"ji","ず":"zu","ぜ":"ze","ぞ":"zo","た":"ta","ち":"chi","つ":"tsu","て":"te","と":"to","だ":"da","ぢ":"ji","づ":"zu","で":"de","ど":"do","な":"na","に":"ni","ぬ":"nu","ね":"ne","の":"no","は":"ha","ひ":"hi","ふ":"fu","へ":"he","ほ":"ho","ば":"ba","び":"bi","ぶ":"bu","べ":"be","ぼ":"bo","ぱ":"pa","ぴ":"pi","ぷ":"pu","ぺ":"pe","ぽ":"po","ま":"ma","み":"mi","む":"mu","め":"me","も":"mo","や":"ya","ゆ":"yu","よ":"yo","ら":"ra","り":"ri","る":"ru","れ":"re","ろ":"ro","わ":"wa","を":"o","ぁ":"a","ぃ":"i","ぅ":"u","ぇ":"e","ぉ":"o","ゎ":"wa"};
function kanaToRomaji(src){
  let s="";
  for(const ch of src){const c=ch.codePointAt(0);
    s+=(c>=0x30A1&&c<=0x30F6)?String.fromCodePoint(c-0x60):ch;}
  const a=[...s];let out="",i=0;
  while(i<a.length){
    const two=a[i]+(a[i+1]||"");
    if(DI[two]){out+=DI[two];i+=2;continue;}
    const ch=a[i];
    if(ch==="っ"){
      const nt=a[i+1]?a[i+1]+(a[i+2]||""):"";
      const nx=DI[nt]||MONO[a[i+1]]||"";
      out+=nx.startsWith("ch")?"t":(nx?nx[0]:"");i++;continue;}
    if(ch==="ー"){
      const m=out.match(/([aiueo])[^aiueo]*$/);out+=m?m[1]:"-";i++;continue;}
    if(ch==="ん"){
      const nt=a[i+1]?a[i+1]+(a[i+2]||""):"";
      const nx=DI[nt]||MONO[a[i+1]]||"";
      out+=(nx&&/^[aiueoy]/.test(nx))?"n'":"n";i++;continue;}
    out+=(MONO[ch]!==undefined)?MONO[ch]:ch;
    i++;
  }
  return out;
}

function inLesson(v,l){
  if(l==="all")return true;
  if(l[0]==="u")return v[3]<=Number(l.slice(1));
  return v[3]==Number(l);
}
function refreshCats(){
  const l=$("lesson").value;
  const pool=VOCAB.filter(v=>inLesson(v,l));
  const cats=[...new Set(pool.map(v=>v[4]))];
  const cur=$("cat").value;
  $("cat").innerHTML='<option value="all">All categories</option>'+
    cats.map(c=>`<option value="${c}">${CAT_EN[c]||c}</option>`).join("");
  if(cats.includes(cur))$("cat").value=cur;
}
function buildDeck(){
  const l=$("lesson").value,c=$("cat").value;
  deck=VOCAB.filter(v=>inLesson(v,l)&&(c==="all"||v[4]===c));
  idx=0;
  render();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  quizScore=0;quizIdx=0;missed=[];

  $("quizResult").classList.add("hidden");
  $("quizBody").classList.remove("hidden");

function nextQ(){
  if(quizIdx>=quizOrder.length){return showResult();}
  const v=deck[quizOrder[quizIdx]],je=$("dir").value==="je";
  $("qWord").textContent=je?v[0]:v[2];
  $("qRomaji").textContent=je?kanaToRomaji(v[0]):"";
  $("qKanji").textContent=je?v[1]:"";
  $("qScore").textContent=`${quizIdx+1} / ${quizOrder.length}　Score: ${quizScore}`;
  const correct=je?v[2]:v[0];
  const pool=shuffle(VOCAB.filter(x=>x!==v).map(x=>je?x[2]:x[0]).filter(x=>x!==correct).filter((x,i,a)=>a.indexOf(x)===i)).slice(0,3);
  const opts=shuffle([correct,...pool]);
  const c=$("choices");c.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.textContent=o;
    if(!je){const r=document.createElement("span");r.className="romaji";r.textContent=kanaToRomaji(o);b.appendChild(r);}
    b.onclick=()=>{
      if(b.dataset.done)return;
      [...c.children].forEach(x=>x.dataset.done=1);
      if(o===correct){b.classList.add("correct");quizScore++;clearMissed(v);}
      else{b.classList.add("wrong");missed.push(v);markMissed(v);
        [...c.children].find(x=>x.textContent.startsWith(correct)).classList.add("correct");}
      setTimeout(()=>{quizIdx++;nextQ();},900);
    };
    c.appendChild(b);
  });
}
function showResult(){
  $("quizBody").classList.add("hidden");
  const r=$("quizResult");r.classList.remove("hidden");
  const pct=Math.round(quizScore/quizOrder.length*100);
  let html=`<h2>Score: ${quizScore} / ${quizOrder.length}（${pct}%）</h2>`;
  html+=pct===100?"<p>Perfect! 🎉</p>":pct>=80?"<p>Great job! 👏</p>":"<p>Keep practicing! 💪</p>";
  if(missed.length){
    html+=`<div class="missed"><strong>Missed words:</strong><ul>`;
    missed.forEach(v=>{html+=`<li>${v[0]}${v[1]?"（"+v[1]+"）":""} <span class="romaji">${kanaToRomaji(v[0])}</span> — ${v[2]}</li>`;});
    html+=`</ul></div>`;
  }
  html+=`<div class="nav" style="margin-top:16px;flex-wrap:wrap;gap:8px;">`;
  if(missed.length)html+=`<button style="background:#c2255c;" onclick="retryMissedNow()">Practice missed only (${missed.length})</button>`;
  html+=`<button onclick="startQuiz()">Try again (all)</button></div>`;
  r.innerHTML=html;
}
// このクイズで間違えた単語だけで再挑戦
function retryMissedNow(){
  deck=[...new Set(missed)];
  startQuiz();
}
// 保存された「Missed」だけで練習（カード→クイズの順でもOK）
$("missedBtn").onclick=()=>{
  const mw=missedWords();
  if(!mw.length){$("missedBtn").textContent="★ Missed (0) — none yet!";setTimeout(updateMissedBtn,1500);return;}
  deck=shuffle(mw.slice());idx=0;
  mode="quiz";
  $("modeQuiz").classList.add("active");$("modeCard").classList.remove("active");
  $("cardMode").classList.add("hidden");$("quizMode").classList.remove("hidden");
  startQuiz();
};
refreshCats();
buildDeck();
updateMissedBtn();
// スマホ: スワイプでカード送り
let tx=null;
document.getElementById("card").addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById("card").addEventListener("touchend",e=>{
  if(tx===null)return;
  const dx=e.changedTouches[0].clientX-tx;tx=null;
  if(Math.abs(dx)>60){if(dx<0){idx=(idx+1)%deck.length;}else{idx=(idx-1+deck.length)%deck.length;}renderCard();}
},{passive:true});
</script>
