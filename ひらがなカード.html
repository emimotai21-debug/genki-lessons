<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひらがな練習カード</title>
<style>
  :root{--orange:#e8590c;--bg:#fff7f0;--ink:#333;--soft:#fff3e6;--brown:#b08968;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;}
  body{background:var(--bg);color:var(--ink);min-height:100vh;padding:16px;}
  h1{font-size:1.2rem;color:var(--orange);text-align:center;margin-bottom:12px;}
  .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px;}
  .controls button,.controls select{padding:8px 14px;border:2px solid var(--orange);border-radius:8px;
    background:#fff;color:var(--orange);font-size:.95rem;cursor:pointer;font-weight:600;}
  .controls button.active{background:var(--orange);color:#fff;}
  /* 行チップ */
  .rows{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;max-width:640px;margin-left:auto;margin-right:auto;}
  .rows button{padding:6px 12px;border:2px solid var(--orange);border-radius:99px;background:#fff;
    color:var(--orange);font-size:.9rem;cursor:pointer;font-weight:700;}
  .rows button.on{background:var(--orange);color:#fff;}
  .stage{max-width:540px;margin:0 auto;}
  .card{perspective:1000px;height:320px;cursor:pointer;}
  .inner{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d;}
  .card.flipped .inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:#fff;border:3px solid var(--orange);
    border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;box-shadow:0 4px 14px rgba(232,89,12,.15);}
  .back{transform:rotateY(180deg);background:var(--soft);}
  .glyph{font-size:9rem;font-weight:700;line-height:1.1;}
  .wordglyph{font-size:4.2rem;font-weight:700;line-height:1.3;text-align:center;}
  .romaji-big{font-size:3.4rem;font-weight:700;color:var(--orange);font-style:italic;}
  .meaning{font-size:1.5rem;color:var(--ink);margin-top:10px;}
  .kata{font-size:1.2rem;color:var(--brown);margin-top:12px;}
  .hint{position:absolute;bottom:10px;font-size:.75rem;color:#bbb;}
  .tag{position:absolute;top:12px;left:14px;font-size:.75rem;background:var(--orange);color:#fff;
    padding:3px 10px;border-radius:99px;}
  .nav{display:flex;justify-content:space-between;margin-top:14px;gap:8px;}
  .nav button{flex:1;padding:12px;font-size:1rem;border:none;border-radius:10px;background:var(--orange);
    color:#fff;cursor:pointer;font-weight:700;}
  .nav button.sub{background:#fff;color:var(--orange);border:2px solid var(--orange);}
  .counter{text-align:center;margin-top:10px;color:#999;font-size:.9rem;}
  .empty{text-align:center;color:#999;padding:40px 0;font-size:1rem;}
  .note{text-align:center;color:#b08968;font-size:.8rem;margin-top:8px;}
</style>
</head>
<body>
<a class="home" href="index.html" style="position:fixed;top:12px;left:12px;z-index:60;font-size:14px;padding:6px 12px;border-radius:8px;background:#b08968;color:#fff;font-weight:700;text-decoration:none;">≡ Menu</a>
<h1>Hiragana Practice</h1>

<div class="controls">
  <button id="mLetter" class="active">Letters</button>
  <button id="mWord">Words</button>
  <button id="shuffleBtn">Shuffle</button>
</div>

<!-- もじモード: 行を複数選択 -->
<div class="rows" id="rowChips"></div>

<!-- たんごモード: どこまで習った？ -->
<div class="controls" id="wordCtl" style="display:none;">
  <select id="upTo"></select>
</div>

<div class="stage">
  <div class="card" id="card">
    <div class="inner">
      <div class="face front"><span class="tag" id="tagF"></span><div id="frontBody"></div><div class="hint">Tap to flip</div></div>
      <div class="face back"><span class="tag" id="tagB"></span><div id="backBody"></div></div>
    </div>
  </div>
  <div class="nav">
    <button class="sub" id="prev">← Back</button>
    <button id="next">Next →</button>
  </div>
  <div class="counter" id="counter"></div>
  <div class="note" id="note"></div>
</div>

<script>
// ===== 行データ =====
const ROWS=[
  {name:"あ a",en:"a-row",kana:"あいうえお"},
  {name:"か ka",en:"ka-row",kana:"かきくけこ"},
  {name:"さ sa",en:"sa-row",kana:"さしすせそ"},
  {name:"た ta",en:"ta-row",kana:"たちつてと"},
  {name:"な na",en:"na-row",kana:"なにぬねの"},
  {name:"は ha",en:"ha-row",kana:"はひふへほ"},
  {name:"ま ma",en:"ma-row",kana:"まみむめも"},
  {name:"や ya",en:"ya-row",kana:"やゆよ"},
  {name:"ら ra",en:"ra-row",kana:"らりるれろ"},
  {name:"わ wa·n",en:"wa-row",kana:"わをん"},
  {name:"゛゜ ga·pa",en:"dakuten",kana:"がぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽ"},
  {name:"っ small",en:"small letters",kana:"っゃゅょ"}
];

// ===== ローマ字変換 =====
const DI={"きゃ":"kya","きゅ":"kyu","きょ":"kyo","ぎゃ":"gya","ぎゅ":"gyu","ぎょ":"gyo","しゃ":"sha","しゅ":"shu","しょ":"sho","じゃ":"ja","じゅ":"ju","じょ":"jo","ちゃ":"cha","ちゅ":"chu","ちょ":"cho","にゃ":"nya","にゅ":"nyu","にょ":"nyo","ひゃ":"hya","ひゅ":"hyu","ひょ":"hyo","びゃ":"bya","びゅ":"byu","びょ":"byo","ぴゃ":"pya","ぴゅ":"pyu","ぴょ":"pyo","みゃ":"mya","みゅ":"myu","みょ":"myo","りゃ":"rya","りゅ":"ryu","りょ":"ryo"};
const MONO={"あ":"a","い":"i","う":"u","え":"e","お":"o","か":"ka","き":"ki","く":"ku","け":"ke","こ":"ko","が":"ga","ぎ":"gi","ぐ":"gu","げ":"ge","ご":"go","さ":"sa","し":"shi","す":"su","せ":"se","そ":"so","ざ":"za","じ":"ji","ず":"zu","ぜ":"ze","ぞ":"zo","た":"ta","ち":"chi","つ":"tsu","て":"te","と":"to","だ":"da","ぢ":"ji","づ":"zu","で":"de","ど":"do","な":"na","に":"ni","ぬ":"nu","ね":"ne","の":"no","は":"ha","ひ":"hi","ふ":"fu","へ":"he","ほ":"ho","ば":"ba","び":"bi","ぶ":"bu","べ":"be","ぼ":"bo","ぱ":"pa","ぴ":"pi","ぷ":"pu","ぺ":"pe","ぽ":"po","ま":"ma","み":"mi","む":"mu","め":"me","も":"mo","や":"ya","ゆ":"yu","よ":"yo","ら":"ra","り":"ri","る":"ru","れ":"re","ろ":"ro","わ":"wa","を":"o","ん":"n","っ":"(small tsu)","ゃ":"(small ya)","ゅ":"(small yu)","ょ":"(small yo)"};
function toRomaji(w){
  const a=[...w];let out="",i=0;
  while(i<a.length){
    const two=a[i]+(a[i+1]||"");
    if(DI[two]){out+=DI[two];i+=2;continue;}
    const ch=a[i];
    if(ch==="っ"){const nt=a[i+1]?a[i+1]+(a[i+2]||""):"";const nx=DI[nt]||MONO[a[i+1]]||"";
      out+=nx.startsWith("ch")?"t":(nx?nx[0]:"");i++;continue;}
    if(ch==="ん"){const nt=a[i+1]?a[i+1]+(a[i+2]||""):"";const nx=DI[nt]||MONO[a[i+1]]||"";
      out+=(nx&&/^[aiueoy]/.test(nx))?"n'":"n";i++;continue;}
    out+=MONO[ch]||ch;i++;
  }
  return out;
}
function toKatakana(w){return [...w].map(c=>{const o=c.codePointAt(0);
  return (o>=0x3041&&o<=0x3096)?String.fromCodePoint(o+0x60):c;}).join("");}

// ===== 単語データ [ことば, いみ] =====（必要な行レベルは自動判定）
const WORDS=[
["あい","love"],["いえ","house"],["うえ","up; on"],["あお","blue"],["あう","to meet"],["え","picture"],
["あか","red"],["えき","station"],["かお","face"],["いく","to go"],["かく","to write"],["きく","to listen"],["こえ","voice"],["あき","autumn"],["いけ","pond"],["くうこう","airport"],
["あさ","morning"],["いす","chair"],["すし","sushi"],["あし","leg; foot"],["うし","cow"],["しお","salt"],["すこし","a little"],["くさ","grass"],["せかい","world"],
["あした","tomorrow"],["いつ","when"],["うた","song"],["くつ","shoes"],["つくえ","desk"],["とけい","watch; clock"],["ちかてつ","subway"],["たかい","expensive; high"],["ことし","this year"],["て","hand"],
["なに","what"],["ねこ","cat"],["いぬ","dog"],["なつ","summer"],["にく","meat"],["おかね","money"],["くに","country"],["あなた","you"],
["はな","flower"],["ひと","person"],["ふね","ship"],["はは","my mother"],["ほし","star"],["ひこうき","airplane"],["はし","chopsticks; bridge"],["へた","not good at"],
["なまえ","name"],["まち","town"],["みみ","ear"],["むし","insect"],["あめ","rain; candy"],["もも","peach"],["みせ","store"],["うみ","sea"],["みち","street"],
["やま","mountain"],["ゆき","snow"],["やさい","vegetable"],["ふゆ","winter"],["やすみ","holiday; day off"],["へや","room"],["やすい","cheap"],["ゆめ","dream"],
["さくら","cherry blossom"],["よる","night"],["くるま","car"],["とり","bird"],["さら","plate"],["ひる","noon"],["れきし","history"],["くすり","medicine"],["あたらしい","new"],["おもしろい","interesting"],["ひだり","left"],
["わたし","I"],["にほん","Japan"],["みかん","mandarin orange"],["おんな","woman"],["せんせい","teacher"],["ほん","book"],["かんこく","Korea"],["しんかんせん","bullet train"],["えん","yen"],["おかあさん","mother"],["おとうさん","father"],
["ともだち","friend"],["たべもの","food"],["のみもの","drink"],["まど","window"],["かぞく","family"],["みず","water"],["かばん","bag"],["めがね","glasses"],["たまご","egg"],["でんわ","telephone"],["えいご","English"],["だいがく","university"],["ごはん","rice; meal"],["おんがく","music"],["ぎんこう","bank"],
["がっこう","school"],["きって","stamp"],["ざっし","magazine"],["きょう","today"],["りょこう","travel"],["じてんしゃ","bicycle"],["べんきょう","study"],["しゃしん","photo"],["おちゃ","green tea"],["ちょっと","a little"],["きっぷ","ticket"],["ひゃく","hundred"]
].filter(w=>w[1]!=="-");

// 文字→行レベル
const LEVEL={};
ROWS.forEach((r,i)=>[...r.kana].forEach(c=>LEVEL[c]=i));
function wordLevel(w){return Math.max(...[...w].map(c=>LEVEL[c]??99));}

// ===== 状態 =====
let mode="letter";      // letter | word
let rowSel=ROWS.map((_,i)=>i===0);  // あ行だけON
let deck=[],idx=0;
const $=id=>document.getElementById(id);

// 行チップ生成
ROWS.forEach((r,i)=>{
  const b=document.createElement("button");
  b.textContent=r.name;
  if(rowSel[i])b.classList.add("on");
  b.onclick=()=>{rowSel[i]=!rowSel[i];b.classList.toggle("on");build();};
  $("rowChips").appendChild(b);
});
// 「〜まで」セレクト生成
ROWS.forEach((r,i)=>{
  const o=document.createElement("option");
  o.value=i;o.textContent="Up to "+r.en+"（"+r.kana[0]+"）";
  $("upTo").appendChild(o);
});
$("upTo").value=1; // か行まで を初期値に

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function build(){
  if(mode==="letter"){
    deck=[];
    ROWS.forEach((r,i)=>{if(rowSel[i])[...r.kana].forEach(c=>deck.push({type:"l",c,row:r.name}));});
  }else{
    const lv=Number($("upTo").value);
    deck=WORDS.filter(w=>wordLevel(w[0])<=lv).map(w=>({type:"w",c:w[0],m:w[1]}));
  }
  shuffle(deck);
  idx=0;render();
}

function render(){
  const card=$("card");card.classList.remove("flipped");
  if(!deck.length){
    $("frontBody").innerHTML='<div class="empty">Choose rows above to start!</div>';
    $("backBody").innerHTML="";$("tagF").textContent="";$("tagB").textContent="";
    $("counter").textContent="0 / 0";$("note").textContent="";return;
  }
  const it=deck[idx];
  if(it.type==="l"){
    $("tagF").textContent=it.row;$("tagB").textContent=it.row;
    $("frontBody").innerHTML=`<div class="glyph">${it.c}</div>`;
    $("backBody").innerHTML=`<div class="romaji-big">${toRomaji(it.c)}</div><div class="kata">Katakana: ${toKatakana(it.c)}</div>`;
    $("note").textContent="";
  }else{
    $("tagF").textContent="Word";$("tagB").textContent="Word";
    $("frontBody").innerHTML=`<div class="wordglyph">${it.c}</div>`;
    $("backBody").innerHTML=`<div class="romaji-big" style="font-size:2.6rem">${toRomaji(it.c)}</div><div class="meaning">${it.m}</div>`;
    $("note").textContent=`${deck.length} words at this level`;
  }
  $("counter").textContent=(idx+1)+" / "+deck.length;
}

$("card").onclick=()=>$("card").classList.toggle("flipped");
$("next").onclick=()=>{idx=(idx+1)%deck.length;render();};
$("prev").onclick=()=>{idx=(idx-1+deck.length)%deck.length;render();};
$("shuffleBtn").onclick=()=>{shuffle(deck);idx=0;render();};
$("upTo").onchange=build;
$("mLetter").onclick=()=>{mode="letter";$("mLetter").classList.add("active");$("mWord").classList.remove("active");
  $("rowChips").style.display="flex";$("wordCtl").style.display="none";build();};
$("mWord").onclick=()=>{mode="word";$("mWord").classList.add("active");$("mLetter").classList.remove("active");
  $("rowChips").style.display="none";$("wordCtl").style.display="flex";build();};
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){idx=(idx+1)%deck.length;render();}
  if(e.key==="ArrowLeft"){idx=(idx-1+deck.length)%deck.length;render();}
  if(e.key===" "){e.preventDefault();$("card").classList.toggle("flipped");}
});
// スマホ: スワイプでカード送り
let tx=null;
$("card").addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
$("card").addEventListener("touchend",e=>{
  if(tx===null)return;
  const dx=e.changedTouches[0].clientX-tx;tx=null;
  if(Math.abs(dx)>60&&deck.length){if(dx<0){idx=(idx+1)%deck.length;}else{idx=(idx-1+deck.length)%deck.length;}render();}
},{passive:true});
build();
</script>
</body>
</html>
